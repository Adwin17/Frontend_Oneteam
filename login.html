<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        main{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #login-form{
            background-color: white;
            padding: 30px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            
        }
        #login-form h1{
            text-align: center;
        }
        #login-form .input-group{
            margin: 10px 0;
            
        }
        .login-options{
            margin-top: 15px;
            font-size: 14px;
        }
        .login-options input[type="checkbox"]{
            width:auto;
            margin-right: 6px;
        }
        .input-group label {
            display: none;
        }
        .input-wrapper{
            position: relative;
        }
        .input-wrapper i{
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: royalblue;
        }
        #login-form .input-wrapper input{
            width: 100%;
            padding: 10px 10px 10px 40px;
            border-radius: 6px;
            border: 1px solid rgb(190, 187, 187);
            transition: border-color 0.3s ease,box-shadow 0.3s ease;
        }
        #login-form .input-wrapper input:focus{
            outline: none;
            border-color: royalblue;
        }
        body{
            background: linear-gradient(
                135deg,
                aliceblue,
                lavender
            );
            font-family: Arial,sans-serif;  
        }
        .submit-section{
            display:block;
            text-align: center;
            margin-top: 20px;
        }
        .submit-section input[type="submit"]{
            width:100%;
            padding:12px;
            border: none;
            border-radius: 8px;
            background-color: royalblue;
            color: white;
            font-size: 16px;
            cursor:pointer;
            transition: background-color 0.3s ease;
        }
        .submit-section input[type="submit"]:hover{
            background-color: mediumslateblue;
        }
        .register-link{
            text-align: center;
            margin-top: 10px;
            color: darkslategray;
        }
        .register-link a{
            color: royalblue;
            font-weight: bold;
            text-decoration: none;
        }
        .register-link a:hover{
            text-decoration: underline;
        }
    </style>
    <body>
    <header>
        <nav>
            <div>
                <div class="logo">MediaHub</div>
            </div>
            <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about_us.html">About Us</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="css_intro.html">CSS </a></li>
        </ul>
        </nav>

    </header>
        
        <main>
            <form id="login-form">
                <h1 style="margin-bottom: 30px;">Login</h1>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" name="email" id="email" placeholder="Enter your E-mail" required >

                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="password" id="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <div class="login-options">
                    <label><input type="checkbox">Remember me</label>
                </div>
                <div class="submit-section">
                    <input type="submit" value="Login">
                </div>
                <p class="register-link">
                    Don't have an account?
                    <a href="register.html">Register</a>

                </p>
            </form>
        </main>

    
</body>
</html>
