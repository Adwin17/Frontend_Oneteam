<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        main{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #register-form{
            background-color: aliceblue;
            padding: 30px;
            width: 400px;
            border-radius: 15px;
            
        }
        #register-form h1{
            text-align: center;
        }
        #register-form div{
            margin: 6px;
            display:grid ;
            grid-template-columns:130px 1fr;
            align-items: center;
        }
        #register-form input{
            padding: 2px;
            border-radius: 4px;
            border: 1px solid darkgray;
            

        }
        .gender{
            display: block !important;
           
        }
        body{
            background-image: url('https://media.geeksforgeeks.org/wp-content/uploads/20210723050322/Lineargradient2.png');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
        }
    </style>
    <body>
    <header>
        <nav>
            <div>
                <div class="logo">OneTeam</div>
            </div>
            <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about_us.html">About Us</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="css_intro.html">CSS </a></li>
        </ul>
        </nav>

        </header>
        
        <main>
            <form id="register-form">
                <h1>Register</h1>

                <div>
                    <label>Full Name</label>
                    <input type="text" name="full_name" id="full_name" placeholder="Enter your Full Name" required>
                </div>
                <div>
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" placeholder="Enter your E-mail id"  >
                </div>
                <div>
                    <label for="dob">Date of Birth</label>
                    <input type="date" name="dob" id="dob">
                </div>
                <div>
                    <label for="age">Age</label>
                    <input type="number" name="age" id="age" min="12" max="60">
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="Enter a password">
                </div>
                <div>
                    <label for="number">Mobile</label>
                    <input type="text" name="number" id="number" placeholder="Enter 10-digit Mobile Number" disabled>
                </div>
                <div class="gender"> 
                    <label>Gender :</label>
                    <label>Male</label>
                    <input type="radio" name="gender" value="gender">
                    <label>Female</label>
                    <input type="radio" name="gender" value="gender">
                    <label>Other</label>
                    <input type="radio" name="gender" value="gender">

                </div>
                <div>
                    <input type="submit" value="Sign Up">
                </div>
            </form>
        </main>
    
</body>
</html>
